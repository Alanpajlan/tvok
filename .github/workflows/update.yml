name: Auto Update Playlist

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download playlist
        run: |
          curl -L "https://raw.githubusercontent.com/hnnyo/cct/refs/heads/main/aku.m3u" -o tvok

      - name: Update repository
        run: |
          git config --global user.name "playlist-bot"
          git config --global user.email "bot@github.com"

          git add tvok

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update playlist"
            git pull --rebase origin main
            git push
          fi
