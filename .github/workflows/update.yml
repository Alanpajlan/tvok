name: Auto Update Playlist

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download playlist
        run: |
          curl -L "https://raw.githubusercontent.com/hnnyo/cct/refs/heads/main/aku.m3u" -o tvok.m3u

      - name: Update repository
        run: |
          git config --global user.name "playlist-bot"
          git config --global user.email "bot@github.com"

          git fetch origin main
          git reset --hard origin/main

          git add tvok.m3u

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update playlist"
            git push origin main --force
          fi
