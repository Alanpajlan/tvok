name: Auto Update Playlist

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Download playlist
        run: |
          curl -L https://raw.githubusercontent.com/hnnyo/cct/refs/heads/main/aku.m3u -o tvok.m3u

      - name: Commit update
        run: |
          git config --global user.name "playlist-bot"
          git config --global user.email "bot@github.com"
          git add tvok.m3u
          git commit -m "Auto update playlist" || echo "No changes"
          git push
